<!DOCTYPE html>
<html>
<head>
  <title>ZyppKart - Payment</title>
  <link rel="stylesheet" href="/src/styles/payment.css">
</head>
<body>

  <nav class="navbar">
    <h2>ZyppKart</h2>
     <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html">Cart 🛒 (<span id="cart-count">0</span>)</a>
      <button id="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="payment-container">
    <h2>Secure Payment 💳</h2>

    <div id="order-summary"></div>

    <form id="payment-form">
      <input type="text" id="card-name" placeholder="Card Holder Name" required>
      <input type="text" id="card-number" placeholder="Card Number (16 digits)" required>
      <input type="text" id="expiry" placeholder="MM/YY" required>
      <input type="text" id="cvv" placeholder="CVV" required>
      <button type="submit">Pay Now</button>
    </form>
  </div>

  <script src="/src/payment.js"></script>

</body>
</html>

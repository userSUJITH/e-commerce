<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <link rel="stylesheet" href="/src/styles/Styles.css">
</head>
<body>
    <div class="log-cont">
       <div class="log-child">
          <form action="" id ="reg-form">
            <h1>Create New Account</h1>
            <!-- <div>
                <label for="profile">upload profile</label>
                <input type="file" id="profile" required>
            </div> -->
            <div>
                <label for="">mail</label>
                <input type="mail" placeholder="enter mail" id="r-mail" required>
            </div>
            <div>
                <label for="">name</label>
                <input type="text" placeholder="enter name" id="r-name" >
            </div>
            <div>
                <label for="">mobile no</label>
                <input type="number" name=""  required placeholder="enter mobile number" id="r-mobile">
            </div>
            <div>
                <label for="">password</label>
                <input type="password" required id="r-pswd">
            </div>
            <div>
                 <button type="submit">Register </button>
                <span>
                    already have account <a href="/pages/login.html"> login here</a>
                </span>
            </div>
          </form>
       </div>
    </div>
    <script src="../src/Script.js" defer></script>
</body>
</html>
